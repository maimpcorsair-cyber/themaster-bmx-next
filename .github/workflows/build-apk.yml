name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android APK with Next.js
        run: |
          # Install Capacitor and Android
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # Remove any old capacitor config if exists
          rm -f capacitor.config.js
          
          # Initialize Capacitor with webDir pointing to .next
          npx cap init "The Master BMX" "com.themaster.bmx" --web-dir=.next
          
          # Add Android platform
          npx cap add android
          
          # Copy web assets
          npx cap copy android
          
          # Build APK
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TheMasterBMX-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          tag_name: v1.0.0
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}