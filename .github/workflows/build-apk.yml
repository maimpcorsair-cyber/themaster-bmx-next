name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Setup Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          rm -f capacitor.config.js
          npx cap init "The Master BMX" "com.themaster.bmx" --web-dir=.next
          npx cap add android

      - name: Copy web assets to static
        run: |
          mkdir -p out
          cp -r .next/out/* out/ 2>/dev/null || cp -r .next/static out/ 2>/dev/null || true
          cp .next/index.html out/ 2>/dev/null || true
          # Copy all next static files
          find .next -name "*.html" -exec cp {} out/ \; 2>/dev/null || true

      - name: Ensure index.html exists
        run: |
          if [ ! -f out/index.html ]; then
            cp .next/server/pages/index.html out/ 2>/dev/null || \
            echo '<!DOCTYPE html><html><head></head><body></body></html>' > out/index.html
          fi

      - name: Sync Capacitor
        run: |
          npx cap copy android
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TheMasterBMX-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          tag_name: v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}